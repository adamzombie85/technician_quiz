<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇者題庫：惡龍討伐戰 - 丙級檢定練習</title>
    <meta name="description" content="結合勇者鬥惡龍元素的丙級檢定練習網站，讓你一邊練習一邊打敗惡龍！">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/iansui@latest/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- docx.js for Word export -->
    <script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="dark-theme">
    <!-- Top Controls (View, A11y & Auth) -->
    <div class="top-controls" style="justify-content: space-between;">
        <div id="site-title" class="site-title" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; font-weight: bold; color: var(--gold);">
            <i class="fas fa-dragon"></i> 勇者題庫
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="user-avatar-btn" class="avatar-btn hidden" onclick="toggleProfileModal()" title="個人檔案">
                <i class="fas fa-cat"></i>
            </button>
            <button id="auth-btn" class="control-btn" onclick="toggleAuthModal()"><i class="fas fa-user"></i> 登入/註冊</button>
            <button onclick="toggleA11yModal()" class="control-btn"><i class="fas fa-universal-access"></i> 無障礙設定</button>
        </div>
    </div>

    <div id="app">
        <!-- Setup Screen -->
        <section id="setup-screen" class="screen active">
            <div class="glass-card main-card">
                <header>
                    <h1 class="glow-text"><i class="fas fa-dragon"></i> 勇者題庫</h1>
                    <p class="subtitle">準備好挑戰惡龍了嗎？選擇你的戰場！</p>
                </header>

                <div class="form-group">
                    <label for="hero-id"><i class="fas fa-user-shield"></i> 勇者 ID (排行榜用)</label>
                    <input type="text" id="hero-id" placeholder="輸入你的勇者名字..." maxlength="10">
                </div>

                <div class="form-group">
                    <label for="subject-select"><i class="fas fa-map"></i> 選擇領域</label>
                    <select id="subject-select">
                        <option value="">-- 請選擇 --</option>
                        <option value="chinese_pasta">中式麵食加工</option>
                        <option value="beverage">飲料調製</option>
                        <option value="technical">技術士技能檢定</option>
                        <option value="food_safety">食品安全衛生</option>
                        <option value="baking">烘焙食品</option>
                    </select>
                </div>

                <div id="sub-options" class="hidden">
                    <div class="form-group">
                        <label for="filter-type"><i class="fas fa-filter"></i> 選題範圍</label>
                        <select id="filter-type">
                            <option value="category">依工作項目 (官方大綱)</option>
                            <option value="knowledge">依知識類別 (統整概念)</option>
                            <option value="keyword">關鍵字搜尋 (精準打擊)</option>
                            <option value="random">隨機選題</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="practice-mode"><i class="fas fa-gamepad"></i> 練習模式</label>
                        <select id="practice-mode">
                            <option value="player">玩家模式 (最後看詳解)</option>
                            <option value="novice">新手模式 (即時看詳解)</option>
                        </select>
                    </div>

                    <div id="filter-value-container" class="form-group hidden">
                        <label for="filter-value" id="filter-value-label">子類別</label>
                        <select id="filter-value"></select>
                    </div>

                    <div id="keyword-search-container" class="form-group hidden">
                        <label for="keyword-input">輸入關鍵字</label>
                        <input type="text" id="keyword-input" placeholder="例如：酵母、冷水麵...">
                    </div>

                    <div class="form-group">
                        <label for="question-count"><i class="fas fa-list-ol"></i> 練習題數</label>
                        <select id="question-count">
                            <!-- populated dynamically based on total questions available in the selected filter -->
                            <option value="20">20 題</option>
                        </select>
                    </div>

                    <button id="start-btn" class="btn btn-primary btn-large">
                        <i class="fas fa-sword"></i> 開始練習
                    </button>
                </div>

                <button id="show-leaderboard-btn" class="btn btn-outline auth-required hidden" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-trophy"></i> 查看我的歷史紀錄 (需登入)
                </button>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen hidden">
            <div class="battle-container">
                <!-- Battle Stage Area -->
                <div class="battle-stage">
                    <div id="slash-effect" class="slash-effect"><i class="fas fa-slash"></i></div>
                    <div class="hero-area">
                        <div id="hero-sprite" class="hero-idle">
                            <i class="fas fa-user-ninja"></i>
                        </div>
                    </div>
                    <div class="dragon-area">
                        <div id="dragon-sprite" class="dragon-idle">
                            <i class="fas fa-dragon"></i>
                        </div>
                    </div>
                </div>

                <div class="hp-bar-container dragon-hp-container">
                    <div class="hp-label-container">
                        <span><i class="fas fa-heart"></i> 惡龍血條</span>
                        <span id="dragon-hp-text">100%</span>
                    </div>
                    <div class="hp-bar">
                        <div id="dragon-hp" class="hp-fill" style="width: 100%;"></div>
                    </div>
                </div>

                <!-- Quiz Area -->
                <div class="glass-card quiz-card">
                    <div class="quiz-header">
                        <span id="timer"><i class="fas fa-clock"></i> 00:00</span>
                        <span id="progress">題目 1 / 20</span>
                        <button id="give-up-btn" class="btn btn-outline" style="color: var(--danger); border-color: var(--danger); padding: 0.25rem 0.75rem; font-size: 0.875rem;"><i class="fas fa-flag"></i> 放棄</button>
                    </div>
                    
                    <div class="question-container">
                        <div id="question-text" class="question-box">載入中...</div>
                        <button id="tts-btn" class="control-btn tts-btn hidden" onclick="readQuestionAloud()"><i class="fas fa-volume-up"></i> 朗讀</button>
                    </div>
                    
                    <div id="options-container" class="options-grid">
                        <!-- Options will be injected here -->
                    </div>
                    
                    <div id="immediate-explanation-container" class="hidden" style="margin-top: 1rem;">
                        <div class="explanation-box" id="immediate-explanation-text"></div>
                        <button id="next-question-btn" class="btn btn-primary btn-large" style="margin-top: 1rem;">
                            <i class="fas fa-arrow-right"></i> 下一題
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen hidden">
            <div class="glass-card result-card">
                <h2 id="result-title">戰鬥結束</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">花費時間</div>
                        <div id="final-time" class="stat-value">00:00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">正確率</div>
                        <div id="final-score" class="stat-value">0%</div>
                    </div>
                </div>

                <div id="result-animation-container" class="result-animation hidden">
                    <img id="result-animation" src="" alt="Battle Result Animation">
                </div>

                <div id="victory-message" class="message-box"></div>

                <div class="action-buttons">
                    <button id="retry-wrong-btn" class="btn btn-secondary">
                        <i class="fas fa-redo"></i> 錯題練習
                    </button>
                    <button id="restart-btn" class="btn btn-outline">
                        <i class="fas fa-home"></i> 重新選擇
                    </button>
                    <button id="show-leaderboard-result-btn" class="btn btn-primary auth-required hidden">
                        <i class="fas fa-trophy"></i> 查看歷史紀錄
                    </button>
                    <button id="export-btn" class="btn btn-gold auth-required hidden">
                        <i class="fas fa-file-alt"></i> 匯出錯題 (txt)
                    </button>
                </div>

                <div id="wrong-questions-review" class="review-area">
                    <h3><i class="fas fa-book-open"></i> 錯題回顧</h3>
                    <div id="review-list"></div>
                </div>
            </div>
        </section>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="modal hidden">
            <div class="glass-card modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-globe"></i> 全服榮譽榜 (前20名)</h2>
                    <button class="close-modal" onclick="document.getElementById('leaderboard-modal').classList.add('hidden')">&times;</button>
                </div>
                <div class="table-wrapper">
                    <table id="leaderboard-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>頭像</th>
                                <th>勇者暱稱</th>
                                <th>等級</th>
                                <th>累積題數</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Accessibility Modal -->
        <div id="a11y-modal" class="modal hidden">
            <div class="glass-card modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-universal-access"></i> 無障礙輔助設定</h2>
                    <button class="close-modal" onclick="document.getElementById('a11y-modal').classList.add('hidden')">&times;</button>
                </div>
                <div class="a11y-settings">
                    <div class="form-group">
                        <label>字體大小</label>
                        <select id="a11y-fontsize" onchange="applyA11y()">
                            <option value="normal">標準</option>
                            <option value="large">放大</option>
                            <option value="xlarge">特大</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>高對比模式</label>
                        <select id="a11y-contrast" onchange="applyA11y()">
                            <option value="off">關閉</option>
                            <option value="high">開啟 (高對比)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>閱讀輔助字體 (減輕閱讀障礙)</label>
                        <select id="a11y-font" onchange="applyA11y()">
                            <option value="off">關閉</option>
                            <option value="dyslexia">開啟</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>語音朗讀功能 (TTS)</label>
                        <select id="a11y-tts" onchange="applyA11y()">
                            <option value="off">關閉</option>
                            <option value="on">開啟 (在題目旁顯示朗讀按鈕)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <!-- Auth Modal -->
        <div id="auth-modal" class="modal hidden">
            <div class="glass-card modal-content" style="max-width: 400px;">
                <div class="modal-header">
                    <h2 id="auth-title"><i class="fas fa-user-circle"></i> 勇者登入</h2>
                    <button class="close-modal" onclick="document.getElementById('auth-modal').classList.add('hidden')">&times;</button>
                </div>
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="auth-email" placeholder="hero@example.com">
                </div>
                <div class="form-group">
                    <label>密碼 (至少 6 碼)</label>
                    <input type="password" id="auth-password" placeholder="******">
                </div>
                <div id="auth-error" style="color: var(--danger); margin-bottom: 1rem; font-size: 0.875rem;"></div>
                <button id="auth-submit-btn" class="btn btn-primary" style="width: 100%; margin-bottom: 0.5rem;">登入</button>
                <button id="auth-google-btn" class="btn btn-outline" style="width: 100%; border-color: #4285F4; color: #4285F4;">
                    <i class="fab fa-google"></i> 使用 Google 帳號登入
                </button>
                <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                    <a href="#" id="auth-toggle-link" style="color: var(--primary);">還沒有帳號？點此註冊</a>
                </div>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profile-modal" class="modal hidden">
            <div class="glass-card modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h2><i class="fas fa-address-card"></i> 勇者檔案</h2>
                    <button class="close-modal" onclick="document.getElementById('profile-modal').classList.add('hidden')">&times;</button>
                </div>
                
                <div class="profile-header">
                    <div class="profile-avatar-large" id="profile-current-avatar">
                        <i class="fas fa-cat"></i>
                    </div>
                    <div class="profile-info">
                        <div class="form-group" style="margin-bottom: 0.5rem;">
                            <input type="text" id="profile-nickname" placeholder="勇者暱稱" style="font-size: 1.25rem; font-weight: bold; width: 100%;">
                        </div>
                        <div class="level-badge" id="profile-level-badge">LV 1 新手勇者</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>更換化身</label>
                    <div class="avatar-selector">
                        <button class="avatar-option active" data-icon="fa-cat"><i class="fas fa-cat"></i></button>
                        <button class="avatar-option" data-icon="fa-dog"><i class="fas fa-dog"></i></button>
                        <button class="avatar-option" data-icon="fa-dragon"><i class="fas fa-dragon"></i></button>
                        <button class="avatar-option" data-icon="fa-crow"><i class="fas fa-crow"></i></button>
                        <button class="avatar-option" data-icon="fa-frog"><i class="fas fa-frog"></i></button>
                        <button class="avatar-option" data-icon="fa-hippo"><i class="fas fa-hippo"></i></button>
                    </div>
                </div>

                <div class="exp-container">
                    <div class="exp-label">
                        <span>經驗值 (題數)</span>
                        <span id="profile-exp-text">0 / 50</span>
                    </div>
                    <div class="hp-bar" style="height: 1rem;">
                        <div id="profile-exp-bar" class="hp-fill" style="background: linear-gradient(90deg, var(--gold), #f59e0b); width: 0%;"></div>
                    </div>
                </div>

                <div class="stats-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0;">
                    <div class="stat-item" style="padding: 1rem;">
                        <div class="stat-label">累積題數</div>
                        <div id="profile-total-questions" class="stat-value" style="font-size: 1.5rem;">0</div>
                    </div>
                    <div class="stat-item" style="padding: 1rem;">
                        <div class="stat-label">累積時間</div>
                        <div id="profile-total-time" class="stat-value" style="font-size: 1.5rem;">0m</div>
                    </div>
                </div>

                <div class="treasures-container">
                    <h3><i class="fas fa-gem"></i> 勇者寶物</h3>
                    <div id="profile-treasures" class="treasures-grid">
                        <!-- Treasures injected here -->
                        <div style="color: var(--text-dim); grid-column: 1/-1; text-align: center;">尚未獲得寶物</div>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button id="save-profile-btn" class="btn btn-primary" style="flex: 1;"><i class="fas fa-save"></i> 儲存設定</button>
                    <button id="profile-logout-btn" class="btn btn-outline" style="flex: 1; border-color: var(--danger); color: var(--danger);"><i class="fas fa-sign-out-alt"></i> 登出</button>
                </div>
            </div>
        </div>

        <!-- Level Up Modal -->
        <div id="levelup-modal" class="modal hidden" style="z-index: 2500;">
            <div class="glass-card modal-content" style="text-align: center; max-width: 400px; animation: levelUpPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <div class="levelup-glow">
                    <i class="fas fa-star" style="color: var(--gold); font-size: 4rem; filter: drop-shadow(0 0 20px var(--gold));"></i>
                </div>
                <h2 style="font-size: 2.5rem; color: var(--gold); margin: 1rem 0;">LEVEL UP!</h2>
                <div id="levelup-message" style="font-size: 1.25rem; margin-bottom: 1.5rem;">
                    你已經達到 <span id="new-level-text" style="font-weight: bold; color: var(--success);">LV 2</span>
                </div>
                <div id="new-treasure-container" class="hidden">
                    <div style="color: var(--text-dim); margin-bottom: 0.5rem;">獲得新寶物：</div>
                    <div class="treasure-item" style="margin: 0 auto; width: 80px; height: 80px; font-size: 2.5rem;">
                        <i id="new-treasure-icon" class="fas fa-sword"></i>
                    </div>
                    <div id="new-treasure-name" style="font-weight: bold; margin-top: 0.5rem; color: var(--gold);">王者之劍</div>
                </div>
                <button class="btn btn-primary btn-large" onclick="document.getElementById('levelup-modal').classList.add('hidden')" style="margin-top: 2rem;">
                    繼續冒險
                </button>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="modal hidden">
            <div class="loading-content">
                <div class="loading-spinner">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="loading-text">勇者整備中...</div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js?v=2"></script>
</body>
</html>
